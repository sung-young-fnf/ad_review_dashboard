# Analysis Squad - 사전분석 7개 Agent 병렬 실행으로 코드베이스 전수 파악
# 사용: Epic 구현 시작 전, 대규모 리팩토링, 새 프로젝트 인수
# WHY: 순차 분석 ~20분 → 병렬 ~5분 (4x 시간 절감)
name: analysis-squad
scale: ANALYSIS
description: "7개 사전분석 Agent를 병렬 실행하여 코드베이스를 빠르게 파악하는 분석 전용 편대"
team_size: 3-4
estimated_time: "5-10분"
trigger_keywords: [사전분석, 전수분석, 코드분석, 구조분석, analysis squad]

# 트리거 조건 (하나라도 충족 시)
triggers:
  - "Epic 구현 시작 전 (코드베이스 전수 파악 필요)"
  - "새 도메인 진입 (처음 다루는 영역)"
  - "대규모 리팩토링 계획"
  - "기술 부채 감사"
  - "프로젝트 인수/온보딩"

roles:
  - name: analysis-coordinator
    agent_type: "general-purpose"
    role: LEAD
    system_prompt_ref: ".claude/squads/roles/analysis-coordinator.md"
    responsibilities:
      - "분석 범위 정의 및 7개 분석 Agent 병렬 디스패치"
      - "분석 결과 종합 → 통합 보고서 작성"
      - "핵심 발견사항 우선순위 정리"
      - "다음 단계 (Planning/Implementation) 연계 제안"

  - name: structure-analyzer
    agent_type: "01-pre-analysis/code-structure-analyzer"
    role: MEMBER
    responsibilities:
      - "모듈 의존성 그래프 분석"
      - "아키텍처 패턴 식별 (FSD, MVC, 계층형 등)"
      - "순환 의존성 감지"

  - name: quality-inspector
    agent_type: "01-pre-analysis/code-quality-inspector"
    role: MEMBER
    responsibilities:
      - "코드 복잡도 측정 (Cyclomatic, Cognitive)"
      - "OWASP Top 10 보안 취약점 스캔"
      - "기술 부채 식별 및 점수화"

  - name: tech-analyzer
    agent_type: "01-pre-analysis/tech-stack-analyzer"
    role: MEMBER
    optional: true
    condition: "새 도메인이거나 기술 스택 확인 필요 시"
    responsibilities:
      - "사용 중인 프레임워크/라이브러리 버전 확인"
      - "EOL/취약 버전 경고"
      - "기술 스택 호환성 검증"

# 추가 Solo Agent (Coordinator가 Task로 디스패치)
parallel_agents:
  - agent_type: "01-pre-analysis/business-analyzer"
    purpose: "비즈니스 도메인 식별, 사용자 유형 파악"
  - agent_type: "01-pre-analysis/git-history-analyzer"
    purpose: "변경 빈도 높은 파일, 반복 패턴, 과거 결정 추적"
  - agent_type: "01-pre-analysis/test-env-analyzer"
    purpose: "테스트 인프라 상태, 커버리지 현황"
  - agent_type: "01-pre-analysis/learnings-researcher"
    purpose: "docs/solutions/ 기반 과거 솔루션 검색"

task_flow:
  - step: 1
    actor: analysis-coordinator
    action: "분석 범위 정의 → 대상 디렉토리/모듈 선정"
  - step: 2
    actor: "[모든 Member + parallel_agents]"
    action: "(병렬) 각자 담당 영역 분석 실행"
    parallel: true
  - step: 3
    actor: analysis-coordinator
    action: "개별 분석 결과 수집 → 통합 보고서 작성"
  - step: 4
    actor: analysis-coordinator
    action: "핵심 발견사항 + 위험도 + 다음 단계 제안 → Main Thread 보고"

completion_condition:
  - "모든 분석 Agent 완료 보고"
  - "통합 보고서 작성 완료"
  - "핵심 발견사항 우선순위 정렬 완료"

cost_multiplier: 2x
