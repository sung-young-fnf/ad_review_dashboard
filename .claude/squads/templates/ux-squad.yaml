# UX Squad - UI/UX 개선을 위한 분석-구현-검증 3인 편대
# 사용: UI 개선, UX 감사, 접근성 수정, 프론트엔드 리디자인
name: ux-squad
scale: UX
description: "Nielsen/WCAG/인지부하 분석 기반 UI/UX 개선 3인 편대"
team_size: 3
estimated_time: "2-8시간"
trigger_keywords: [ux, frontend, UI, 개선, 감사, 접근성]

roles:
  - name: ux-analyst
    agent_type: "general-purpose"
    role: LEAD
    system_prompt_ref: ".claude/squads/roles/ux-analyst.md"
    responsibilities:
      - "Nielsen 10 Heuristics 분석"
      - "WCAG 2.2 AA 접근성 감사"
      - "인지 부하 측정 (Hick/Fitts/Miller)"
      - "AS-IS 분석 → TO-BE 설계 문서 작성"
      - "UI BLACKLIST 패턴 위반 탐지"

  - name: ui-dev
    agent_type: "04-implementation/code-writer"
    role: MEMBER
    system_prompt_ref: ".claude/squads/roles/ui-dev.md"
    responsibilities:
      - "TO-BE 설계 기반 UI 컴포넌트 구현"
      - "shadcn/ui 컴포넌트 활용 (기존 디자인 시스템 준수)"
      - "Progressive Disclosure, Optimistic UI 등 창의적 패턴 적용"
      - "반응형 대응 (320px ~ 1920px)"

  - name: verifier
    agent_type: "general-purpose"
    role: MEMBER
    system_prompt_ref: ".claude/squads/roles/ux-verifier.md"
    responsibilities:
      - "Before/After 스크린샷 비교 검증"
      - "Nielsen Heuristics 점수 비교 (개선 확인)"
      - "WCAG 2.2 AA 준수 최종 확인"
      - "정보 계층 검증 (이름 > 뱃지 > 설명 > 메타)"

task_flow:
  - step: 1
    actor: ux-analyst
    action: |
      AS-IS 분석:
        - Nielsen 10 Heuristics 점수 매기기
        - WCAG 2.2 AA 위반 항목 목록화
        - 인지 부하 측정 (Miller's Law: 5점 이하 목표)
        - UI BLACKLIST 패턴 위반 탐지
  - step: 2
    actor: ux-analyst
    action: |
      TO-BE 설계:
        - 개선 포인트별 구체적 UI 변경 명세
        - 창의적 대안 제안 (BLACKLIST 회피)
        - 정보 계층 재설계
  - step: 3
    actor: ui-dev
    action: "TO-BE 명세 기반 구현 → shadcn/ui 활용 → pnpm build"
  - step: 4
    actor: verifier
    action: |
      Before/After 검증:
        - 스크린샷 비교
        - Nielsen 점수 재측정 (개선 확인)
        - WCAG 접근성 재검증
        - 정보 계층 최종 확인
  - step: 5
    actor: ui-dev
    action: "(피드백 있을 시) verifier 피드백 반영 → 재구현"
  - step: 6
    actor: ux-analyst
    action: "최종 승인 → completion_condition 체크"

completion_condition:
  - "Nielsen Heuristics 점수 AS-IS 대비 개선"
  - "WCAG 2.2 AA 위반 0개"
  - "인지 부하 5점 이하 (Miller's Law)"
  - "UI BLACKLIST 패턴 미사용"
  - "정보 계층 검증 통과 (핵심 정보 가시성 확보)"
  - "pnpm build 성공 (TypeScript 에러 0개)"
  - "Before/After 비교 문서 존재"

cost_multiplier: 3x
