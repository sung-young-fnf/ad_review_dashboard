# Solo - 팀 생성 없이 단독 Agent로 처리하는 경량 모드
# 사용: 소규모 버그 수정, 간단한 코드 변경, 단일 파일 수정
name: solo
scale: SOLO
description: "팀 생성 없이 키워드 기반으로 최적 단독 Agent를 선택하는 경량 모드"
team_size: 0
estimated_time: "10분-2시간"
trigger_keywords: [버그, 수정, 개선, 테스트, 간단]

# Solo 모드는 roles 대신 keyword → agent 매핑 사용
roles: []

# 키워드 기반 단독 Agent 매핑
agent_routing:
  - keywords: [버그, bug, error, 에러, 오류, 수정]
    agent_type: "99-utils/error-fixer"
    description: "버그/에러 수정 전문 Agent"
    pre_action: "historian/get_error_solutions로 과거 해결책 먼저 검색"

  - keywords: [db, 스키마, 마이그레이션, 테이블, 컬럼]
    agent_type: "04-implementation/db-code-writer"
    description: "DB 스키마/마이그레이션 전문 Agent"
    pre_action: "DATABASE_SCHEMA_RULES.md 참조"

  - keywords: [간단, 오타, import, 변수명, 설정, config]
    agent_type: "99-utils/quick-modifier"
    description: "1-4줄 간단 수정 전문 Agent"
    pre_action: "없음 (직접 수정)"

  - keywords: [default]
    agent_type: "04-implementation/code-writer"
    description: "범용 코드 구현 Agent (기본값)"
    pre_action: "Assumption Manifesto 작성"

# Solo 모드는 단일 Agent이므로 task_flow가 단순
task_flow:
  - step: 1
    actor: router
    action: "키워드 분석 → agent_routing에서 최적 Agent 선택"
  - step: 2
    actor: selected-agent
    action: "pre_action 수행 (있을 경우)"
  - step: 3
    actor: selected-agent
    action: "구현/수정 → pnpm build 검증"
  - step: 4
    actor: selected-agent
    action: "완료 → praetorian_compact 호출"

completion_condition:
  - "pnpm build 성공 (TypeScript 에러 0개)"
  - "요청한 변경 사항 반영 완료"

cost_multiplier: 1x
