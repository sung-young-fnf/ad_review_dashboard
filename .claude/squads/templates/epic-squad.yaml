# Epic Squad - 대규모 시스템 변경을 위한 4인 편대
# 사용: 새 Epic 시작, 아키텍처 변경, 플랫폼 기능 추가
name: epic-squad
scale: EPIC
description: "Epic 단위 대규모 작업을 병렬 처리하는 4인 편대"
team_size: 4-5
estimated_time: "4-16시간"
trigger_keywords: [epic, 시스템, 플랫폼, 아키텍처, 대형, 신규]

roles:
  - name: architect
    agent_type: "general-purpose"
    role: LEAD
    system_prompt_ref: ".claude/squads/roles/architect.md"
    responsibilities:
      - "Epic/Story/Task 문서 생성 및 의존성 정의"
      - "TaskCreate로 Task 목록 생성 + 의존성 설정"
      - "아키텍처 결정 및 기술 제약 정의"
      - "dev 구현 결과 검증 + 충돌 해결"
      - "전체 진행 상황 모니터링 및 조율"

  - name: dev-1
    agent_type: "04-implementation/code-writer"
    role: MEMBER
    system_prompt_ref: ".claude/squads/roles/dev.md"
    spawn_options:
      # isolation: worktree  # ⚠️ 비활성화 (GitHub #29110, #27649 — worktree 데이터 유실 + silent freeze)
      model: opus  # 2.1.72: per-invocation model override 복원
    responsibilities:
      - "TaskList에서 blockedBy 없는 Task 자율 claim"
      - "Task AC 기반 구현 + pnpm build 검증"
      - "완료 시 TaskUpdate(status: completed) 호출"

  - name: dev-2
    agent_type: "04-implementation/code-writer"
    role: MEMBER
    system_prompt_ref: ".claude/squads/roles/dev.md"
    spawn_options:
      # isolation: worktree  # ⚠️ 비활성화 (GitHub #29110, #27649 — worktree 데이터 유실 + silent freeze)
      model: opus  # 2.1.72: per-invocation model override 복원
    responsibilities:
      - "TaskList에서 blockedBy 없는 Task 자율 claim"
      - "Task AC 기반 구현 + pnpm build 검증"
      - "완료 시 TaskUpdate(status: completed) 호출"

  - name: reviewer
    agent_type: "general-purpose"
    role: MEMBER
    system_prompt_ref: ".claude/squads/roles/reviewer.md"
    spawn_options:
      model: sonnet  # 리뷰는 sonnet으로 충분, opus 토큰 절약
    responsibilities:
      - "dev 구현 완료 후 코드 리뷰 (AC 달성 검증)"
      - "API Contract 일치 여부 확인"
      - "크로스 컴포넌트 일관성 검증"
      - "피드백 → dev에게 수정 요청"

  - name: ux-reviewer
    agent_type: "general-purpose"
    role: MEMBER
    optional: true
    condition: "Epic에 UI/UX/프론트엔드 Story가 포함된 경우"
    system_prompt_ref: ".claude/squads/roles/ux-reviewer.md"
    responsibilities:
      - "Nielsen Heuristics 기반 UX 검증"
      - "WCAG 2.2 AA 접근성 확인"
      - "Before/After UI 비교 검증"
      - "UX 이슈 → dev에게 근거 기반 피드백"

# architect가 TaskCreate → dev들이 TaskList로 자율 claim → reviewer가 검증
task_flow:
  - step: 1
    actor: architect
    action: "Epic 분석 → Story 분해 → Task 생성 (TaskCreate + 의존성 설정)"
  - step: 2
    actor: architect
    action: "Task 배분 (dev-1/dev-2는 순차 실행 — 파일 충돌 방지를 위해 의존성 설정)"
  - step: 3
    actor: dev-1
    action: "TaskList 조회 → blockedBy 없는 Task claim → 구현"
  - step: 4
    actor: dev-2
    action: "TaskList 조회 → blockedBy 없는 Task claim → 구현 (dev-1 완료 후 순차)"
  - step: 5
    actor: architect
    action: "dev 구현 결과 검증 → pnpm build 확인"
  - step: 6
    actor: reviewer
    action: "머지된 코드 리뷰 → AC 달성 검증 → 피드백"
  - step: 7
    actor: ux-reviewer
    action: "(UI Story일 때만) Nielsen/WCAG 기반 UX 검증 → dev 피드백"
  - step: 8
    actor: architect
    action: "전체 통합 검증 → pnpm build → completion_condition 체크"

# agtx 패턴: Per-Phase Model Config
# +multi-model 활성화 시 Phase별 최적 모델 자동 선택
# 비활성화 시 기본 Claude-only로 동작
phase_overrides:
  analysis:
    model: gemini          # 100만 토큰 컨텍스트 → 대규모 코드 분석
    rationale: "전체 모듈을 한번에 분석하여 아키텍처 파악"
  planning:
    model: claude-opus     # 구조적 사고 + 코드베이스 직접 접근
    rationale: "Epic/Story 구조 설계 및 의존성 정의"
  implementation:
    model: claude-opus     # 코드 생성 + 파일 편집
    rationale: "코드베이스 직접 접근이 필수인 구현 작업"
  review:
    model: codex           # 코드 추론 체인
    rationale: "깊은 로직 오류 및 엣지케이스 분석"

# agtx 패턴: Artifact-Based Phase Completion
# 산출물 파일 존재 시 해당 Phase 자동 완료 감지
# skip_if_exists: true면 이미 산출물이 있으면 Phase 스킵
artifacts:
  analysis:
    path: "docs/epics/{epic_id}/analysis-report.md"
    skip_if_exists: true
  planning:
    path: "docs/epics/{epic_id}/stories/*.md"
    skip_if_exists: true
  implementation:
    signal: "pnpm build && pnpm tsc --noEmit"
    skip_if_exists: false
  review:
    signal: "reviewer approval via TaskUpdate"
    skip_if_exists: false

completion_condition:
  - "모든 Task가 completed 상태"
  - "pnpm build 성공 (TypeScript 에러 0개)"
  - "reviewer 승인 완료"
  - "(UI Story 포함 시) ux-reviewer 승인 완료"
  - "Epic AC 전체 달성"

cost_multiplier: 4x
