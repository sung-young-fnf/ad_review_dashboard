# Fidelity-First Clone Rules
# 목적: Reference 코드를 복제할 때 원본 컨셉과 UI를 절대 변경하지 않도록 강제

version: "1.0.0"
updated: "2025-09-28"

# ═══════════════════════════════════════════════════════════
# LEVEL 1: 컨셉 충실도 (CRITICAL - 변경 절대 금지)
# ═══════════════════════════════════════════════════════════

concept_fidelity:
  enforcement: BLOCKING  # 위반 시 워크플로우 중단
  target: 100%

  rules:
    - id: CF-001
      name: "핵심 컨셉 절대 유지"
      description: "Reference의 핵심 가치/목적을 변경 금지"
      examples:
        forbidden:
          - "주간 회고 OKR → 표준 OKR 변경"
          - "개인 회고 기반 → 수동 입력 변경"
          - "조직도 중심 → 일반 목록 변경"
        allowed:
          - "Figma 디자인 프로젝트 → Next.js 프로젝트"
          - "SaaS Admin → OKR Admin (도메인만 변경)"

    - id: CF-002
      name: "사용자 시나리오 동등성"
      description: "모든 사용자 여정이 원본과 동일하게 작동"
      validation:
        method: "user_flow_comparison"
        steps:
          - "Reference 사용자 시나리오 추출"
          - "구현된 코드 시나리오 추출"
          - "1:1 매칭 검증"
        threshold: 100%

    - id: CF-003
      name: "도메인 용어 일관성"
      description: "핵심 도메인 용어 변경 금지"
      examples:
        forbidden:
          - "WeeklyOKR → Goal"
          - "Reflection → Feedback"
          - "OrganizationMap → TeamList"
        allowed:
          - "User → Member (상위 개념)"
          - "createdAt → createdDate (동등 개념)"

# ═══════════════════════════════════════════════════════════
# LEVEL 2: UI 충실도 (MAJOR - 95%+ 매칭 필수)
# ═══════════════════════════════════════════════════════════

ui_fidelity:
  enforcement: WARNING  # 95% 미만 시 경고, 90% 미만 시 차단
  target: 95%

  rules:
    - id: UF-001
      name: "컴포넌트 1:1 매핑"
      description: "모든 Reference 컴포넌트가 반드시 매핑되어야 함"
      validation:
        method: "component_mapping_check"
        steps:
          - "Reference 컴포넌트 리스트 생성"
          - "Current 컴포넌트 매핑 테이블 작성"
          - "누락 컴포넌트 검출"
        threshold: 95%
      exceptions:
        - "테스트 전용 컴포넌트"
        - "내부 구현 컴포넌트 (__)

    - id: UF-002
      name: "레이아웃 구조 유지"
      description: "페이지/섹션 구조를 원본과 동일하게 유지"
      examples:
        forbidden:
          - "3칸 레이아웃 → 2칸 레이아웃"
          - "탭 네비게이션 → 사이드바 네비게이션"
          - "Card 그리드 → Table 리스트"
        allowed:
          - "Flexbox → CSS Grid (시각적 동일)"
          - "Tabs → App Router (탭 구조 유지)"

    - id: UF-003
      name: "시각적 요소 충실도"
      description: "색상/폰트/간격 등을 Figma와 95% 일치"
      validation:
        method: "visual_diff_check"
        tools: ["Figma API", "Screenshot Comparison"]
        threshold: 95%

# ═══════════════════════════════════════════════════════════
# LEVEL 3: 아키텍처 변환 (FLEXIBLE - 기능 불변 보장)
# ═══════════════════════════════════════════════════════════

architecture_transformation:
  enforcement: GUIDANCE  # 권장사항, 차단하지 않음
  principle: "기능 불변성 보장"

  allowed_transformations:
    - id: AT-001
      name: "상태 관리 현대화"
      transformations:
        - from: "useState + Context"
          to: "Zustand / Jotai"
          condition: "동일한 상태 흐름 유지"

        - from: "Mock API (fetch)"
          to: "React Query + REST API"
          condition: "동일한 데이터 구조 유지"

    - id: AT-002
      name: "라우팅 현대화"
      transformations:
        - from: "Tab Navigation"
          to: "App Router"
          conditions:
            - "탭 구조 유지 (URL 파라미터)"
            - "탭 간 전환 동작 동일"
            - "중첩 라우팅 금지 (구조 변경)"

    - id: AT-003
      name: "스타일링 현대화"
      transformations:
        - from: "CSS Modules"
          to: "Tailwind CSS"
          condition: "className만 변경, 시각적 동일"

        - from: "Inline Styles"
          to: "CSS-in-JS"
          condition: "스타일 값 100% 동일"

  forbidden_transformations:
    - id: FT-001
      name: "구조적 변경 금지"
      examples:
        - "단일 페이지 → 다중 페이지 분할"
        - "컴포넌트 통합 (A + B → C)"
        - "컴포넌트 분리 (A → A1 + A2) - 기존 A가 없어지는 경우"

    - id: FT-002
      name: "로직 재작성 금지"
      examples:
        - "OKR 생성 로직 재구현"
        - "주간 필터링 로직 변경"
        - "권한 체크 로직 수정"

# ═══════════════════════════════════════════════════════════
# Agent별 적용 규칙
# ═══════════════════════════════════════════════════════════

agent_enforcement:
  C01_figma_reference_analyzer:
    required_outputs:
      - "concept_description"  # CF-001 검증용
      - "component_inventory"  # UF-001 검증용
      - "user_scenarios"       # CF-002 검증용

    validation_rules:
      - CF-001  # 컨셉 추출
      - UF-001  # 컴포넌트 리스트 생성

  C02_clone_epic_creator:
    required_validations:
      - CF-001  # Epic 설명에 컨셉 유지 명시
      - CF-002  # Success Criteria에 시나리오 동등성

    forbidden_keywords:
      - "개선"
      - "현대화"
      - "단순화"
      - "~으로 변경"

    required_keywords:
      - "복제"
      - "동일하게"
      - "원본대로"

  C03_clone_tech_spec_engineer:
    required_outputs:
      - "component_mapping_table"  # UF-001 필수
      - "architecture_transformation_plan"  # AT-001~003

    validation_rules:
      - UF-001  # 95% 매핑률 검증
      - UF-002  # 레이아웃 구조 체크
      - AT-001~003  # 허용 변환만 사용
      - FT-001~002  # 금지 변환 차단

  C04_clone_code_writer:
    checkpoints:
      - step: "before_component_generation"
        validations: [UF-001, UF-002]

      - step: "after_component_generation"
        validations: [CF-002, UF-003]

      - step: "after_integration"
        validations: [CF-001, CF-002, CF-003]

    required_artifacts:
      - "component_mapping_status.md"  # 매핑 진행 상황
      - "fidelity_checkpoint_report.md"  # 체크포인트 결과

  C05_figma_clone_validator:
    required_reports:
      - "concept_fidelity_score"      # LEVEL 1
      - "ui_fidelity_score"            # LEVEL 2
      - "component_mapping_coverage"   # UF-001
      - "visual_similarity_score"      # UF-003

    passing_criteria:
      concept_fidelity: 100%
      ui_fidelity: 95%
      component_mapping: 95%
      visual_similarity: 90%

# ═══════════════════════════════════════════════════════════
# 예외 처리 (Escape Hatch)
# ═══════════════════════════════════════════════════════════

exceptions:
  justifiable_changes:
    - category: "기술적 제약"
      examples:
        - "브라우저 API 미지원"
        - "라이브러리 호환성 이슈"
      required_documentation:
        - "변경 사유"
        - "대안 검토 기록"
        - "기능 동등성 증명"

    - category: "보안/성능"
      examples:
        - "XSS 취약점 수정"
        - "N+1 쿼리 최적화"
      required_documentation:
        - "보안/성능 이슈 설명"
        - "원본 동작 유지 증명"

  exception_approval_process:
    - "변경 사유 문서 작성"
    - "C05 Validator에서 플래그"
    - "개발자 리뷰 필수"
    - "승인 후 EXCEPTIONS.md에 기록"

# ═══════════════════════════════════════════════════════════
# 메트릭 및 리포팅
# ═══════════════════════════════════════════════════════════

metrics:
  concept_fidelity:
    calculation: |
      (원본 사용자 시나리오 수 - 변경된 시나리오 수) / 원본 시나리오 수 * 100
    target: 100%

  ui_fidelity:
    calculation: |
      (매핑된 컴포넌트 수 / 원본 컴포넌트 수) * 100
    target: 95%

  visual_similarity:
    calculation: |
      Figma vs Screenshot 픽셀 비교 (SSIM)
    target: 90%

reporting:
  checkpoint_report:
    frequency: "매 Agent 실행 후"
    format: "Markdown"
    location: ".claude/reports/fidelity-checkpoints/"

  final_scorecard:
    timing: "C05 완료 시"
    format: "Markdown + JSON"
    location: "docs/clone-fidelity-report.md"

# ═══════════════════════════════════════════════════════════
# 교육 및 가이드라인
# ═══════════════════════════════════════════════════════════

guidelines:
  mindset:
    - "복제는 개선이 아닙니다"
    - "원본보다 나은 방법이 있어도, 원본을 따릅니다"
    - "변경이 필요하면, 먼저 원본대로 만든 후 별도 Epic으로 개선"

  workflow:
    - "C01: 원본의 본질 이해 (컨셉 추출)"
    - "C02: 원본의 범위 정의 (변경 금지)"
    - "C03: 원본의 구조 복사 (1:1 매핑)"
    - "C04: 원본의 코드 복제 (체크포인트)"
    - "C05: 원본과의 일치 검증 (95%+)"

  common_pitfalls:
    - pitfall: "더 나은 UX가 있어서 변경"
      correction: "Clone 완료 후, 별도 Epic으로 개선"

    - pitfall: "최신 패턴이 있어서 변경"
      correction: "허용된 변환(AT-001~003)만 사용"

    - pitfall: "컴포넌트 통합이 효율적"
      correction: "원본 구조 유지 (FT-001)"