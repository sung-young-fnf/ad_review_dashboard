name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # Python backend lint (FastAPI 앱이 있을 때)
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: []  # 앱 추가 시 여기에 등록: [s3gate, another-app]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          cd apps/${{ matrix.app }}/backend
          uv sync --frozen
          uv run ruff check src/
