# {{APP_NAME}} Backend — Validate, Build, Push & Deploy (DEV)
#
# 필요한 GitHub Variables (environment: dev):
#   ECR_URL_BACKEND=xxxx.dkr.ecr.ap-northeast-2.amazonaws.com/repo-backend
#   ROLE_ARN=arn:aws:iam::xxxx:role/ecr-push-role
#   AWS_REGION=ap-northeast-2

name: "{{APP_NAME}} Backend DEV"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/{{APP_NAME}}/backend/**"
      - "packages/**"
      - ".github/workflows/{{APP_NAME}}-backend-dev.yml"

concurrency:
  group: "{{APP_NAME}}-backend-dev-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "image_tag=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT

  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - name: Lint
        run: pnpm turbo lint --filter='./apps/{{APP_NAME}}/backend'
        continue-on-error: true
      - name: Type Check
        run: pnpm turbo typecheck --filter='./apps/{{APP_NAME}}/backend'

  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [setup]
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/{{APP_NAME}}/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_URL_BACKEND }}:${{ needs.setup.outputs.image_tag }}
            ${{ vars.ECR_URL_BACKEND }}:dev-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=min,scope=backend
          platforms: linux/amd64

  deploy:
    name: Update Helm & Deploy
    runs-on: ubuntu-latest
    needs: [setup, validate, docker-push]
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image tag
        run: |
          TAG="${{ needs.setup.outputs.image_tag }}"
          sed -i '/^backend:/,/^frontend:/ s/tag: .*/tag: "'"${TAG}"'"/' charts/{{APP_NAME}}/values-dev.yaml
          echo "Updated backend tag: ${TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.setup.outputs.image_tag }}"
          # 동시 머지로 다른 chore 커밋이 끼어들면 같은 줄 rebase 충돌 -> silent 실패 (cloud-portal 2026-06-10 사례).
          # 매 시도마다 fresh origin 위에 태그 변경을 재적용하고, 소진 시 명시적으로 실패시킨다.
          git checkout -- . # 앞 step 의 sed 변경 폐기 (루프 안에서 재적용) — dirty tree 면 checkout -B 거부됨
          for i in {1..5}; do
            git fetch origin ${{ github.ref_name }}
            git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
            sed -i '/^backend:/,/^frontend:/ s/tag: .*/tag: "'"${TAG}"'"/' charts/{{APP_NAME}}/values-dev.yaml
            git add charts/{{APP_NAME}}/values-dev.yaml
            if git diff --staged --quiet; then echo "이미 최신 태그"; exit 0; fi
            git commit -m "chore(deploy): {{APP_NAME}} backend dev → ${TAG}"
            git push origin HEAD:${{ github.ref_name }} && exit 0
            sleep $((i * 2))
          done
          echo "::error::values 태그 push 실패 (5회 재시도 소진) — 수동으로 charts/{{APP_NAME}}/values-dev.yaml 의 backend tag 를 ${TAG} 로 갱신 필요"
          exit 1
