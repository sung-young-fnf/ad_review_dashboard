# 앱별 배포 워크플로우 템플릿
# 복사 후 {{APP_NAME}}을 실제 앱 이름으로 교체
#
# 필요한 GitHub Variables (environment: dev):
#   ECR_URL_BACKEND=xxxx.dkr.ecr.ap-northeast-2.amazonaws.com/repo-backend
#   ECR_URL_FRONTEND=xxxx.dkr.ecr.ap-northeast-2.amazonaws.com/repo-frontend
#   ROLE_ARN=arn:aws:iam::xxxx:role/ecr-push-role
#   AWS_REGION=ap-northeast-2

name: "{{APP_NAME}} DEV - Build & Push"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/{{APP_NAME}}/**"
      - "packages/**"
      - ".github/workflows/deploy-{{APP_NAME}}.yml"

concurrency:
  group: "{{APP_NAME}}-dev-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-backend:
    name: "Backend"
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/{{APP_NAME}}/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_URL_BACKEND }}:dev-latest
            ${{ vars.ECR_URL_BACKEND }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: "Frontend"
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/{{APP_NAME}}/frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_URL_FRONTEND }}:dev-latest
            ${{ vars.ECR_URL_FRONTEND }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
