apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: advertisement-prd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: advertisement
  source:
    repoURL: https://github.com/fnf-process/ad_review_dashboard.git
    targetRevision: main
    path: charts/advertisement
    helm:
      valueFiles:
        - values.yaml
        - values-prd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: advertisement-prd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
