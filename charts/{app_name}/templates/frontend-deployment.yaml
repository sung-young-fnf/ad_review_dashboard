apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.fullname" . }}-frontend
        app.kubernetes.io/component: frontend
        {{- if .Values.frontend.apm.enabled }}
        # Datadog APM auto-instrumentation (admission controller label-based)
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/service: "{{ include "app.fullname" . }}-frontend"
        tags.datadoghq.com/env: {{ .Values.global.environment | quote }}
        tags.datadoghq.com/version: {{ .Values.frontend.image.tag | default .Chart.AppVersion | quote }}
        {{- end }}
      {{- if .Values.frontend.apm.enabled }}
      annotations:
        # ddtrace lib version — 인프라 전반 일괄 관리. Dockerfile 에 ddtrace 추가 금지.
        admission.datadoghq.com/{{ .Values.frontend.apm.language }}-lib.version: {{ .Values.frontend.apm.libVersion | quote }}
      {{- end }}
    spec:
      # AZ + 노드 분산 — 한 노드/AZ 다운 시 single point of failure 방지
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "app.fullname" . }}-frontend
              app.kubernetes.io/component: frontend
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "app.fullname" . }}-frontend
              app.kubernetes.io/component: frontend
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            {{- toYaml .Values.frontend.env | nindent 12 }}
          {{- with .Values.frontend.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
